version: "3.9"

services:
  backend:
    image: nexta-backend
    container_name: nexta-backend
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app

  frontend:
    image: nexta-frontend
    container_name: nexta-frontend
    ports:
      - "8501:8501"
    environment:
      PYTHONPATH: /app
    depends_on:
      - backend